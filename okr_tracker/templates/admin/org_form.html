{% extends "base.html" %}
{% block title %}{{ 'Edit' if org else 'New' }} Organization{% endblock %}
{% block content %}
<h2 class="mb-4">{{ 'Edit' if org else 'New' }} Organization</h2>
<div class="row">
  <div class="col-md-6">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ org.name if org else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Slug <small class="text-muted">(URL-friendly, e.g. acme-corp)</small></label>
        <input type="text" name="slug" class="form-control" value="{{ org.slug if org else '' }}" required>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ url_for('admin.index') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
