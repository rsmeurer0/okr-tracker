name: Feature
description: New feature or enhancement
title: "[feat]: "
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be built?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Test environment
      options:
        - Development (develop branch)
        - Preview (PR branch)
        - Production (main branch)
    validations:
      required: true
